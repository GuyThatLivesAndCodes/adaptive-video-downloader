<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Downloading video… — Adaptive Video Downloader</title>
  <link rel="stylesheet" href="progress.css" />
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.42l2.3 2.3V4a1 1 0 0 1 1-1ZM5 18a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1Z"/></svg>
      </div>
      <h1 id="title">Preparing download…</h1>
    </div>

    <div id="label" class="label"></div>

    <div class="bar"><div id="barFill" class="barFill"></div></div>
    <div id="stat" class="stat"></div>

    <div class="actions">
      <button id="cancelBtn" class="danger">Stop &amp; save what we have</button>
      <a id="saveLink" class="save hidden" download>Save video</a>
    </div>

    <div id="log" class="log" aria-live="polite"></div>
  </div>

  <script src="progress.js"></script>
</body>
</html>
